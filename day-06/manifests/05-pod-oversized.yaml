apiVersion: v1
kind: Pod
metadata:
  name: oversized-pod
  namespace: dev-team
  labels:
    app: config-demo
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "echo 'This should not run'; sleep 3600"]
    resources:
      limits:
        cpu: "4"
        memory: "8Gi"
      requests:
        cpu: "4"
        memory: "8Gi"
