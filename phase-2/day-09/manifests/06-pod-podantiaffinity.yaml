apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ha
  namespace: scheduling-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-ha
  template:
    metadata:
      labels:
        app: web-ha
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - web-ha
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: web
        image: nginx:alpine
