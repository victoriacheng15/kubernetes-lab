apiVersion: v1
kind: Pod
metadata:
  name: readiness-pod
  namespace: probes-lab
  labels:
    app: readiness-pod
spec:
  containers:
    - name: readiness-container
      image: busybox:1.36
      command:
        - sh
        - -c
        - "sleep 20; touch /tmp/ready; sleep 600"
      readinessProbe:
        exec:
          command:
            - cat
            - /tmp/ready
        initialDelaySeconds: 5
        periodSeconds: 5
