apiVersion: v1
kind: Pod
metadata:
  name: startup-pod
  namespace: probes-lab
  labels:
    app: startup-pod
spec:
  containers:
    - name: startup-container
      image: busybox:1.36
      command:
        - sh
        - -c
        - "sleep 30; touch /tmp/started; touch /tmp/healthy; sleep 600"
      startupProbe:
        exec:
          command:
            - cat
            - /tmp/started
        failureThreshold: 30
        periodSeconds: 2
      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy
        periodSeconds: 5
