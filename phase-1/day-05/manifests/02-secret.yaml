apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  labels:
    app: config-demo
type: Opaque # The default type for arbitrary user-defined secrets
data:
  # Base64 encoded values
  DB_USER: dGVzdC11c2Vy # base64 for "test-user"
  DB_PASS: c3VwZXJzZWNyZXRkYnBhc3N3b3Jk # base64 for "supersecretdbpassword"
  api-key.txt: bXktc3VwZXItc2VjcmV0LWFwaS1rZXk= # base64 for "my-super-secret-api-key"
