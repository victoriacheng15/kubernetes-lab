apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: phase1-project
  labels:
    app: web-app
spec:
  type: NodePort
  selector:
    app: web-app
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080 # Exposes the app externally on static port 30080
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: phase1-project
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-container
        image: python:3.10-alpine
        command:
        - "sh"
        - "-c"
        - |
          pip install --no-cache-dir redis flask
          python -c '
          import os, redis
          from flask import Flask
          app = Flask(__name__)
          r = redis.Redis(host=os.environ.get("REDIS_HOST", "localhost"), port=6379, password=os.environ.get("REDIS_PASSWORD"))
          @app.route("/")
          def hello():
              try:
                  hits = r.incr("hits")
                  return f"<html><head><title>Guestbook</title></head><body style=\"text-align: center; font-family: sans-serif; padding-top: 50px;\"><h1 style=\"color: #4CAF50;\">Hello! Welcome to the Guestbook!</h1><p style=\"font-size: 20px;\">Visitor count: <strong>{hits}</strong></p></body></html>"
              except Exception as e:
                  return f"<h1>Error connecting to database:</h1><p>{e}</p>", 500
          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=8080)
          '
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_HOST
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: REDIS_PASSWORD
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "250m"
