apiVersion: v1
kind: Pod
metadata:
  name: db-pod
  namespace: network-lab
  labels:
    app: database
spec:
  containers:
  - name: redis
    image: redis:alpine
    ports:
    - containerPort: 6379
      name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: network-lab
spec:
  selector:
    app: database
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
