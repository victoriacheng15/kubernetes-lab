apiVersion: v1
kind: Pod
metadata:
  name: liveness-pod
  namespace: probes-lab
  labels:
    app: liveness-pod
spec:
  containers:
    - name: liveness-container
      image: busybox:1.36
      command:
        - sh
        - -c
        - "touch /tmp/healthy; sleep 30; rm -f /tmp/healthy; sleep 600"
      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy
        initialDelaySeconds: 5
        periodSeconds: 5
